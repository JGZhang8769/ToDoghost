<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <g transform="translate(100, 100)">
    <!-- Ears drawn behind ghost -->
    <!-- Right ear -->
    <path d="M 215 25 C 215 -40 230 -60 240 -60 C 255 -60 255 -40 255 25" fill="#ffffff" stroke="#111827" stroke-width="12" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M 225 25 C 225 -30 235 -45 240 -45 C 245 -45 245 -30 245 25" fill="#fbcfe8" stroke="#111827" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Left ear -->
    <path d="M 145 25 C 145 -40 130 -60 120 -60 C 105 -60 105 -40 105 25" fill="#ffffff" stroke="#111827" stroke-width="12" stroke-linejoin="round" stroke-linecap="round"/>
    <path d="M 135 25 C 135 -30 125 -45 120 -45 C 115 -45 115 -30 115 25" fill="#fbcfe8" stroke="#111827" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Main Ghost Body -->
    <path d="M150 0 C 80 0 80 70 80 120 L 80 300 C 80 320 100 340 120 320 C 140 300 160 330 180 310 C 200 290 220 320 240 310 C 260 300 280 320 280 300 L 280 120 C 280 70 280 0 150 0 Z" fill="#ffffff" stroke="#111827" stroke-width="12" stroke-linejoin="round"/>

    <!-- Face -->
    <ellipse cx="140" cy="80" rx="8" ry="12" fill="#111827"/>
    <ellipse cx="190" cy="80" rx="8" ry="12" fill="#111827"/>
    <path d="M 155 100 Q 165 110 175 100" fill="none" stroke="#111827" stroke-width="6" stroke-linecap="round"/>

    <!-- Diary Book (replacing the previous long box) -->
    <rect x="90" y="130" width="140" height="150" rx="8" fill="#f97316" stroke="#111827" stroke-width="12"/>
    <rect x="110" y="130" width="120" height="150" rx="4" fill="#ffffff" stroke="#111827" stroke-width="12"/>
    <rect x="190" y="130" width="15" height="150" fill="#ea580c" stroke="#111827" stroke-width="6"/>
    <!-- Diary Text lines -->
    <path d="M 130 160 L 170 160" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
    <path d="M 130 190 L 170 190" stroke="#111827" stroke-width="6" stroke-linecap="round"/>
    <path d="M 130 220 L 150 220" stroke="#111827" stroke-width="6" stroke-linecap="round"/>

    <!-- Left hand overlay (holding diary) -->
    <path d="M 80 170 C 90 190 110 190 100 160" fill="#ffffff" stroke="#111827" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right hand overlay (holding diary) -->
    <path d="M 280 170 C 270 190 250 190 240 160" fill="#ffffff" stroke="#111827" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  </g>
</svg>
